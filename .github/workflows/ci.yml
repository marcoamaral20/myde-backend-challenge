name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Check, build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myde
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/myde
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/myde_test
      REDIS_URL: redis://localhost:6379
      META_VERIFY_TOKEN: ci-verify-token
      META_APP_SECRET: ci-app-secret
      META_API_BASE_URL: http://localhost:8001
      AI_PROVIDER: stub
      OPENAI_MODEL: gpt-4.1-mini
      OPENAI_TIMEOUT_MS: 15000
      LOG_LEVEL: silent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: |
          node -e "const { Client } = require('pg'); (async () => { const client = new Client({ connectionString: process.env.DATABASE_URL }); await client.connect(); await client.query('CREATE DATABASE myde_test'); await client.end(); })().catch((error) => { console.error(error); process.exit(1); });"

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
